<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>德州扑克 · 房间大厅</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <span id="connectionStatus" class="badge badge--offline connection-badge">未连接</span>
  <div class="app">
    <header>
      <h1>德州扑克</h1>
    </header>

    <section class="card login-card" id="loginCard">
      <p class="screen-kicker">进入牌桌前</p>
      <h2>先设置你的昵称</h2>
      <label for="playerName">昵称</label>
      <input id="playerName" type="text" placeholder="输入你的昵称" maxlength="20" />
      <button id="btnSetName" type="button">继续</button>
    </section>

    <section class="card lobby-card" id="lobbyCard" hidden>
      <div class="entry-head">
        <div>
          <p class="screen-kicker">房间入口</p>
          <h2>选择进入方式</h2>
          <span>当前昵称：<strong id="currentPlayerName">—</strong></span>
        </div>
        <button id="btnChangeName" type="button" class="room-leave-btn">修改昵称</button>
      </div>

      <div class="actions">
        <button id="btnCreate" type="button">创建房间</button>
        <div class="join-row">
          <input id="roomId" type="text" placeholder="房间号" maxlength="8" />
          <button id="btnJoin" type="button">加入房间</button>
        </div>
      </div>
    </section>

    <p id="message" class="message" role="status"></p>

    <section class="card room-card" id="roomPanel" hidden>
      <div class="room-head">
        <div>
          <h2>当前房间</h2>
          <p class="room-id"><strong id="currentRoomId">—</strong></p>
        </div>
        <button id="btnLeaveRoom" type="button" class="room-leave-btn">退出</button>
      </div>

      <div class="phase-bar">
        <span id="gamePhase" class="phase-tag">waiting</span>
        <span class="pot-label">牌桌模式</span>
      </div>
      <p id="gameMessage" class="game-message">—</p>
      <p id="actionTimer" class="action-timer" hidden>—</p>

      <div class="poker-table">
        <ul id="seatList" class="seat-list table-seats"></ul>
        <div class="table-center">
          <div class="table-pot">底池 <strong id="gamePot">0</strong></div>
          <div id="communityCards" class="cards-row community-cards"></div>
          <div class="table-message" id="tableMessage">—</div>
        </div>
      </div>

      <div id="mySeatPanel" class="my-seat-panel" hidden>
        <div class="my-seat-info">
          <div>
            <span class="my-seat-label">我的手牌</span>
            <strong id="mySeatName">—</strong>
          </div>
          <span id="mySeatMeta">等待入局</span>
        </div>
        <div id="myCards" class="cards-row my-cards"></div>
      </div>

      <div class="section-label table-player-count">
        <h3>玩家 <span id="playerCount">0</span></h3>
      </div>

      <div id="winnersBox" class="winners-box" hidden>
        <div class="winner-kicker">本局结果</div>
        <ul id="winnersList"></ul>
      </div>

      <div id="actionLogBox" class="action-log-box" hidden>
        <button id="btnToggleLogs" type="button" class="log-summary">最近：<span id="lastActionText">—</span></button>
        <ul id="actionLogList" hidden></ul>
      </div>
    </section>
  </div>

  <footer id="bottomDock" class="bottom-dock" hidden>
    <button id="btnStartHand" type="button" class="dock-btn dock-btn--start">开始新一局</button>
    <div id="actionBar" class="action-bar" hidden>
      <div class="bet-controls" hidden>
        <label for="betAmount">下注金额</label>
        <input id="betAmount" type="number" min="1" step="1" inputmode="numeric" placeholder="输入金额" />
        <div class="quick-bets">
          <button id="btnHalfPot" type="button">1/2 池</button>
          <button id="btnPot" type="button">底池</button>
          <button id="btnDouble" type="button">2x</button>
          <button id="btnTriple" type="button">3x</button>
        </div>
      </div>
      <div class="action-buttons">
        <button id="btnAmountToggle" type="button" class="btn-secondary">金额</button>
        <button id="btnFold" type="button" class="btn-danger">弃牌</button>
        <button id="btnCheck" type="button">Check</button>
        <button id="btnBet" type="button">下注</button>
        <button id="btnCall" type="button">跟注</button>
        <button id="btnRaise" type="button">加注</button>
        <button id="btnAllIn" type="button">All-in</button>
      </div>
    </div>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
