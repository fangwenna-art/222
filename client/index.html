<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>德州扑克 · 房间大厅</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>德州扑克</h1>
    </header>

    <section class="card lobby-card" id="lobbyCard">
      <span id="lobbyConnectionStatus" class="badge badge--offline lobby-connection-status">未连接</span>
      <p class="screen-kicker">进入牌桌前</p>
      <h2>设置昵称并选择房间</h2>
      <label for="playerName">昵称</label>
      <input id="playerName" type="text" placeholder="输入你的昵称" maxlength="20" />

      <div class="actions">
        <button id="btnCreate" type="button">创建房间</button>
        <div class="join-row">
          <input id="roomId" type="text" placeholder="房间号" maxlength="8" />
          <button id="btnJoin" type="button">加入房间</button>
        </div>
      </div>
    </section>

    <p id="message" class="message" role="status"></p>

    <section class="card room-card" id="roomPanel" hidden>
      <div class="room-head">
        <span id="connectionStatus" class="badge badge--offline room-head-status">未连接</span>
        <p class="room-id"><span class="room-id-label">房间号</span> <strong id="currentRoomId">—</strong></p>
        <button id="btnLeaveRoom" type="button" class="room-leave-btn">退出</button>
      </div>

      <div class="phase-bar">
        <span id="gamePhase" class="phase-tag">waiting</span>
        <span class="pot-label" id="roomPlayerSummary">玩家 0/9</span>
        <span id="roomBlindsLabel" class="pot-label room-blinds-label" aria-live="polite">盲注 —</span>
      </div>

      <section id="roomSettingsBox" class="room-settings" data-mode="readonly" hidden aria-label="盲注设置">
        <button id="btnToggleSettings" type="button" class="room-settings-toggle" aria-expanded="false" aria-controls="roomSettingsBody">
          <span class="room-settings-toggle-main">
            <span class="room-settings-kicker">盲注设置</span>
            <span id="roomSettingsSummary" class="room-settings-summary">10 / 20 · 起始 1000</span>
          </span>
          <span id="roomSettingsStatus" class="room-settings-status" data-tone="neutral">只读</span>
        </button>

        <div id="roomSettingsBody" class="room-settings-body" hidden>
          <p id="roomSettingsHelp" class="room-settings-help">—</p>

          <dl id="roomSettingsDisplay" class="room-settings-display">
            <div><dt>起始筹码</dt><dd id="displayStartingChips">—</dd></div>
            <div><dt>小盲</dt><dd id="displaySmallBlind">—</dd></div>
            <div><dt>大盲</dt><dd id="displayBigBlind">—</dd></div>
          </dl>

          <div id="roomSettingsForm" class="room-settings-form" hidden>
            <div class="room-settings-grid">
              <label class="room-settings-field">
                <span>起始筹码</span>
                <input id="settingStartingChips" type="number" min="100" max="100000" step="100" inputmode="numeric" autocomplete="off" />
              </label>
              <label class="room-settings-field">
                <span>小盲</span>
                <input id="settingSmallBlind" type="number" min="1" max="5000" step="1" inputmode="numeric" autocomplete="off" />
              </label>
              <label class="room-settings-field">
                <span>大盲</span>
                <input id="settingBigBlind" type="number" min="2" max="10000" step="1" inputmode="numeric" autocomplete="off" />
              </label>
            </div>
            <p id="roomSettingsError" class="room-settings-error" hidden role="alert"></p>
            <div class="room-settings-actions">
              <button id="btnPresetBlinds1020" type="button" class="btn-secondary">10 / 20</button>
              <button id="btnPresetBlinds2550" type="button" class="btn-secondary">25 / 50</button>
              <button id="btnCancelSettings" type="button" class="btn-secondary">取消</button>
              <button id="btnSaveSettings" type="button">保存设置</button>
            </div>
          </div>
        </div>
      </section>

      <p id="gameMessage" class="game-message">—</p>
      <p id="actionTimer" class="action-timer" hidden>—</p>
      <p id="presenceBanner" class="presence-banner" hidden role="status" aria-live="polite"></p>

      <div id="waitingPlayersBox" class="waiting-players" hidden>
        <span class="waiting-players-kicker">等待入局</span>
        <ul id="waitingPlayersList" class="waiting-players-list"></ul>
      </div>

      <div id="handHistoryBox" class="hand-history" hidden>
        <div class="hand-history-kicker">最近局数</div>
        <ul id="handHistoryList" class="hand-history-list"></ul>
      </div>

      <div id="chipStatsBox" class="chip-stats" hidden>
        <div class="chip-stats-kicker">筹码统计</div>
        <div class="chip-stats-head" aria-hidden="true">
          <span>玩家</span>
          <span>净盈亏</span>
          <span>胜/局</span>
          <span>筹码</span>
        </div>
        <ul id="chipStatsList" class="chip-stats-list"></ul>
      </div>

      <div class="poker-table">
        <ul id="seatList" class="seat-list table-seats"></ul>
        <div class="table-center">
          <div class="table-pot"><span id="tablePotLabel">底池</span> <strong id="gamePot">0</strong></div>
          <div id="communityCards" class="cards-row community-cards"></div>
          <div class="table-message" id="tableMessage">—</div>
        </div>
      </div>

      <div id="mySeatPanel" class="my-seat-panel" hidden>
        <div class="my-seat-info">
          <div>
            <span class="my-seat-label">我的手牌</span>
            <strong id="mySeatName">—</strong>
          </div>
          <span id="mySeatMeta">等待入局</span>
        </div>
        <div id="myCards" class="cards-row my-cards"></div>
      </div>

      <div id="resultPanel" class="result-panel" hidden>
        <button id="btnToggleResult" type="button" class="result-panel-toggle">
          <span id="resultKicker" class="result-kicker">行动记录</span>
          <span id="resultLatest" class="result-latest">—</span>
        </button>
        <div id="resultPanelBody" class="result-panel-body" hidden>
          <ul id="resultSummaryList" class="result-summary-list"></ul>
          <div id="resultLogKicker" class="result-log-kicker" hidden>本局明细</div>
          <ul id="resultLogList" class="result-log-list"></ul>
        </div>
      </div>
    </section>
  </div>

  <footer id="bottomDock" class="bottom-dock" hidden>
    <button id="btnStartHand" type="button" class="dock-btn dock-btn--start">开始新一局</button>
    <div id="actionBar" class="action-bar" hidden>
      <div id="actionHint" class="action-hint">等待行动</div>
      <div class="bet-controls" hidden>
        <label for="betAmount">下注 / 加注金额</label>
        <input id="betAmount" type="number" min="1" step="1" inputmode="numeric" placeholder="输入金额" />
        <div class="quick-bets">
          <button id="btnHalfPot" type="button">1/2 池</button>
          <button id="btnPot" type="button">底池</button>
          <button id="btnDouble" type="button">2x</button>
          <button id="btnTriple" type="button">3x</button>
        </div>
      </div>
      <div class="action-buttons">
        <div class="action-row action-row--main">
          <button id="btnCheck" type="button">过牌</button>
          <button id="btnCall" type="button">跟注</button>
          <button id="btnBet" type="button">下注</button>
          <button id="btnRaise" type="button">加注</button>
        </div>
        <div class="action-row action-row--secondary">
          <button id="btnAmountToggle" type="button" class="btn-secondary">调整金额</button>
          <button id="btnFold" type="button" class="btn-secondary">弃牌</button>
          <button id="btnAllIn" type="button" class="btn-danger">全下</button>
        </div>
      </div>
      <div id="allInConfirm" class="all-in-confirm" hidden>
        <strong>确认全下？</strong>
        <span id="allInConfirmText">你将投入全部筹码</span>
        <div class="all-in-confirm-actions">
          <button id="btnCancelAllIn" type="button" class="btn-secondary">取消</button>
          <button id="btnConfirmAllIn" type="button" class="btn-danger">确认全下</button>
        </div>
      </div>
    </div>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="spec.js"></script>
  <script src="app.js"></script>
</body>
</html>
